  .header { background-color: #4CAF50; color: white; text-align: center; padding: 15px; font-size: 18px; font-weight: bold; }
  
  /* 하단 또는 상단 탭 메뉴 */
  .tab-menu { display: flex; background-color: #333; position: sticky; top: 0; z-index: 100; }
  .tab-btn { flex: 1; padding: 12px 5px; background: none; color: white; border: none; font-size: 14px; cursor: pointer; transition: 0.3s; }
  .tab-btn.active { background-color: #4CAF50; font-weight: bold; }
  
  .app-section { display: none; padding: 20px; animation: fadeIn 0.3s; }
  .app-section.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* 메인 카드 스타일 */
  .menu-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
  .menu-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; cursor: pointer; border: 2px solid transparent; }
  .menu-card:active { transform: scale(0.98); }
  .menu-card h3 { margin: 0 0 8px 0; font-size: 20px; color: #333; }
  .menu-card p { margin: 0; color: #666; font-size: 13px; line-height: 1.4; }

  /* 달력 공통 디자인 */

  .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; border: 1px solid #eee; background-color: #eee; }

  .calendar-day { padding: 10px 2px; background: white; min-height: 70px; position: relative; display: flex; flex-direction: column; align-items: center; font-size: 12px; }
  .calendar-day.today { background: #fffde7; outline: 2px solid #4CAF50; z-index: 1; }
  
  /* 급식 달력 전용 스타일 */
  .lunch-text { font-size: 9px; color: #444; margin-top: 4px; line-height: 1.2; word-break: break-all; }
