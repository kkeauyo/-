<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>새솔고 반 관리 앱</title>
<style>
  body { margin: 0; font-family: 'Malgun Gothic', sans-serif; background-color: #f4f4f9; }
  .header { background-color: #4CAF50; color: white; text-align: center; padding: 15px; font-size: 20px; font-weight: bold; }
  
  .tab-menu { display: flex; background-color: #333; }
  .tab-btn { flex: 1; padding: 10px 5px; background: none; color: white; border: none; font-size: 15px; cursor: pointer; transition: 0.3s; }
  .tab-btn.active { background-color: #4CAF50; font-weight: bold; border-bottom: 4px solid #fff; }
  
  .app-section { display: none; padding: 20px; }
  .app-section.active { display: block; }

  /* 메인 카드 디자인 */
  .menu-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 10px; }
  .menu-card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; cursor: pointer; transition: 0.2s; border: 2px solid transparent; }
  .menu-card:hover { transform: translateY(-5px); border-color: #4CAF50; }
  
  /* 달력 디자인 */
  .calendar-wrapper { background: white; padding: 10px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
  .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .calendar-header button { padding: 5px 15px; cursor: pointer; border: none; background: #eee; border-radius: 5px; font-weight: bold; }
  .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; }
  .calendar-day-name { font-weight: bold; padding: 5px; background: #e0e0e0; font-size: 12px; }
  
  .calendar-day { padding: 8px 0; background: #fafafa; border: 1px solid #eee; min-height: 60px; position: relative; display: flex; flex-direction: column; align-items: center; font-size: 13px; }
  .calendar-day.today { background: #fffde7; border: 2px solid #4CAF50; font-weight: bold; }
  
  /* 일정 점 */
  .event-dot { width: 6px; height: 6px; background: #ff4b2b; border-radius: 50%; margin-top: 2px; }
  /* 급식 표시 */
  .lunch-tag { font-size: 10px; color: #4CAF50; margin-top: 2px; font-weight: bold; }

  /* 툴팁 디자인 (PC 전용) */
  .custom-tooltip { 
    visibility: hidden; background-color: rgba(0, 0, 0, 0.85); color: #fff; text-align: left; 
    border-radius: 6px; padding: 8px; position: absolute; z-index: 99; bottom: 105%; left: 50%; 
    transform: translateX(-50%); white-space: pre-wrap; width: max-content; max-width: 180px; 
    font-size: 11px; opacity: 0; transition: opacity 0.2s; pointer-events: none; line-height: 1.4;
  }
  .calendar-day:hover .custom-tooltip { visibility: visible; opacity: 1; }

  /* 공통 스타일 */
  input { width: 100%; padding: 10px; margin: 5px 0 15px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px; }
  button.action-btn { width: 100%; padding: 10px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
  ul { padding: 0; list-style-type: none; }
  li { background: white; margin: 5px 0; padding: 10px; border-radius: 5px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
</style>
</head>
<body>

<div class="header">새솔고 스마트 관리 앱</div>

<div class="tab-menu">
  <button class="tab-btn active" onclick="switchTab('main-section', this)">🏠 홈</button>
  <button class="tab-btn" onclick="switchTab('event-section', this)">📅 일정/급식</button>
  <button class="tab-btn" onclick="switchTab('score-section', this)">💯 점수</button>
</div>

<div id="main-section" class="app-section active">
  <div class="menu-grid">
    <div class="menu-card" onclick="document.querySelectorAll('.tab-btn')[1].click()">
      <h3 id="today-lunch-title">🍱 오늘의 급식</h3>
      <p id="main-today-lunch">불러오는 중...</p>
    </div>
    <div class="menu-card" onclick="document.querySelectorAll('.tab-btn')[1].click()">
      <h3>📅 학급 일정</h3>
      <p>수행평가와 행사를 확인하세요.</p>
    </div>
  </div>
</div>

<div id="event-section" class="app-section">
  <h3>일정 추가</h3>
  <input type="date" id="eventDate">
  <input type="text" id="eventText" placeholder="내용 입력">
  <button class="action-btn" onclick="addEvent()">추가하기</button>

  <h3 style="margin-top:30px;">📅 학급 달력 (마우스 올리면 급식 확인)</h3>
  <div class="calendar-wrapper">
    <div class="calendar-header">
      <button onclick="changeMonth(-1)">◀</button>
      <h4 id="calendar-month-year">2024년 5월</h4>
      <button onclick="changeMonth(1)">▶</button>
    </div>
    <div id="calendar-grid" class="calendar-grid"></div>
  </div>
  
  <ul id="eventList" style="margin-top:20px;"></ul>
</div>

<div id="score-section" class="app-section">
  <input id="name" placeholder="학생 이름">
  <input id="score" type="number" placeholder="점수">
  <button class="action-btn" onclick="addScore()">점수 기록</button>
  <ul id="scoreList"></ul>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBWku20Zf1Mn0mvdkCId2HnIsd1WDu3e9I",
  authDomain: "schoolproject-10903-34016.firebaseapp.com",
  databaseURL: "https://schoolproject-10903-34016-default-rtdb.firebaseio.com/",
  projectId: "schoolproject-10903-34016",
  storageBucket: "schoolproject-10903-34016.firebasestorage.app",
  messagingSenderId: "1003562540722",
  appId: "1:1003562540722:web:7e66f08a92a326c6d3b3ab"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 전역 상태
let currentDate = new Date();
let eventsArray = [];
let lunchCache = {}; // 급식 데이터를 날짜별로 저장 { "2024-05-08": "메뉴..." }

// 화면 전환
window.switchTab = function(id, btn) {
  document.querySelectorAll('.app-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

// --- 급식 데이터 불러오기 (나이스 API) ---
async function fetchMonthlyLunch(year, month) {
  const fromDate = `${year}${String(month + 1).padStart(2, '0')}01`;
  const toDate = `${year}${String(month + 1).padStart(2, '0')}31`;

  try {
    // 1. 학교 코드 조회 (새솔고)
    const schoolRes = await fetch(`https://open.neis.go.kr/hub/schoolInfo?Type=json&SCHUL_NM=새솔고등학교`);
    const schoolData = await schoolRes.json();
    const school = schoolData.schoolInfo[1].row[0];

    // 2. 해당 월 급식 조회
    const mealRes = await fetch(`https://open.neis.go.kr/hub/mealServiceDietInfo?Type=json&ATPT_OFCDC_SC_CODE=${school.ATPT_OFCDC_SC_CODE}&SD_SCHUL_CODE=${school.SD_SCHUL_CODE}&MLSV_FROM_YMD=${fromDate}&MLSV_TO_YMD=${toDate}`);
    const mealData = await mealRes.json();

    if (mealData.mealServiceDietInfo) {
      mealData.mealServiceDietInfo[1].row.forEach(row => {
        const dateKey = `${row.MLSV_YMD.substring(0,4)}-${row.MLSV_YMD.substring(4,6)}-${row.MLSV_YMD.substring(6,8)}`;
        lunchCache[dateKey] = row.DDISH_NM.replace(/[0-9\.]/g, '').replace(/<br\/>/g, '\n');
      });
    }
  } catch (e) { console.error("급식 로딩 실패", e); }
  
  renderCalendar();
  updateMainLunch();
}

function updateMainLunch() {
  const todayStr = `${currentDate.getFullYear()}-${String(currentDate.getMonth()+1).padStart(2,'0')}-${String(currentDate.getDate()).padStart(2,'0')}`;
  const menu = lunchCache[todayStr] || "오늘은 급식 정보가 없습니다.";
  document.getElementById("main-today-lunch").innerText = menu.split('\n').slice(0,3).join(', ') + "...";
}

// --- 일정 관리 ---
window.addEvent = function() {
  const date = document.getElementById("eventDate").value;
  const text = document.getElementById("eventText").value;
  if(!date || !text) return alert("입력 확인!");
  push(ref(db, "events"), { date, text });
}

onValue(ref(db, "events"), (snap) => {
  eventsArray = [];
  const list = document.getElementById("eventList");
  list.innerHTML = "";
  snap.forEach(child => {
    eventsArray.push({ key: child.key, ...child.val() });
    const li = document.createElement("li");
    li.innerHTML = `<span>${child.val().date}: ${child.val().text}</span> <button class="delete-btn" onclick="deleteEvent('${child.key}')">삭제</button>`;
    list.appendChild(li);
  });
  renderCalendar();
});

window.deleteEvent = (key) => remove(ref(db, "events/" + key));

// --- 달력 렌더링 ---
function renderCalendar() {
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();
  document.getElementById("calendar-month-year").innerText = `${year}년 ${month + 1}월`;

  const firstDay = new Date(year, month, 1).getDay();
  const lastDate = new Date(year, month + 1, 0).getDate();
  const grid = document.getElementById("calendar-grid");
  
  let html = `
    <div class="calendar-day-name" style="color:red">일</div><div class="calendar-day-name">월</div>
    <div class="calendar-day-name">화</div><div class="calendar-day-name">수</div>
    <div class="calendar-day-name">목</div><div class="calendar-day-name">금</div>
    <div class="calendar-day-name" style="color:blue">토</div>
  `;

  for(let i=0; i<firstDay; i++) html += `<div class="calendar-day" style="border:none; background:none;"></div>`;

  const today = new Date();
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

  for(let i=1; i<=lastDate; i++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
    const isToday = dateStr === todayStr ? 'today' : '';
    const dayEvents = eventsArray.filter(e => e.date === dateStr);
    const dayLunch = lunchCache[dateStr];

    let content = `<b>${i}</b>`;
    let tooltipText = `[ ${dateStr} ]\n`;

    // 일정 표시
    dayEvents.forEach(e => {
      content += `<div class="event-dot"></div>`;
      tooltipText += `📌 ${e.text}\n`;
    });

    // 급식 표시
    if(dayLunch) {
      content += `<div class="lunch-tag">🍴 급식</div>`;
      tooltipText += `\n🍱 급식 메뉴:\n${dayLunch}`;
    }

    html += `
      <div class="calendar-day ${isToday}">
        ${content}
        <div class="custom-tooltip">${tooltipText}</div>
      </div>
    `;
  }
  grid.innerHTML = html;
}

window.changeMonth = (dir) => {
  currentDate.setMonth(currentDate.getMonth() + dir);
  fetchMonthlyLunch(currentDate.getFullYear(), currentDate.getMonth());
};

// --- 점수 관리 ---
window.addScore = () => {
  const name = document.getElementById("name").value;
  const score = document.getElementById("score").value;
  if(name && score) push(ref(db, "scores"), { name, score });
};
onValue(ref(db, "scores"), (snap) => {
  const list = document.getElementById("scoreList");
  list.innerHTML = "";
  snap.forEach(c => {
    const li = document.createElement("li");
    li.innerHTML = `${c.val().name}: ${c.val().score}점 <button class="delete-btn" onclick="remove(ref(db, 'scores/${c.key}'))">X</button>`;
    list.appendChild(li);
  });
});

// 초기 실행
fetchMonthlyLunch(currentDate.getFullYear(), currentDate.getMonth());
</script>
</body>
</html>
