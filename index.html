<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>반 관리 앱</title>
<style>
  /* 보기 좋게 약간의 간격을 추가했습니다 */
  .filter-section { margin-bottom: 10px; padding: 10px; background: #eee; border-radius: 5px; display: inline-block; }
</style>
</head>
<body>

<h2>점수 관리</h2>

<select id="scoreCategory">
  <option value="국어">국어</option>
  <option value="영어">영어</option>
  <option value="수학">수학</option>
  <option value="기타">기타</option>
</select>
<input id="name" placeholder="이름">
<input id="score" type="number" placeholder="점수">
<button onclick="addScore()">추가</button>

<hr>

<div class="filter-section">
  <label>과목별 보기: </label>
  <select id="filterCategory" onchange="renderScores()">
    <option value="all">전체 보기</option>
    <option value="국어">국어</option>
    <option value="영어">영어</option>
    <option value="수학">수학</option>
    <option value="기타">기타</option>
  </select>
</div>

<ul id="scoreList"></ul>

<hr>

<h2>일정 관리</h2>
<input type="date" id="eventDate">
<input type="text" id="eventText" placeholder="일정 내용">
<button onclick="addEvent()">추가</button>
<ul id="eventList"></ul>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBWku20Zf1Mn0mvdkCId2HnIsd1WDu3e9I",
  authDomain: "schoolproject-10903-34016.firebaseapp.com",
  databaseURL: "https://schoolproject-10903-34016-default-rtdb.firebaseio.com/",
  projectId: "schoolproject-10903-34016",
  storageBucket: "schoolproject-10903-34016.firebasestorage.app",
  messagingSenderId: "1003562540722",
  appId: "1:1003562540722:web:7e66f08a92a326c6d3b3ab"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const scoreRef = ref(db, "scores");
const eventRef = ref(db, "events");

// --- 점수 관리 기능 ---

// 데이터를 임시로 담아둘 배열 (필터링을 위해 필요함)
let allScores = []; 

// 🔹 점수 추가
window.addScore = function() {
  const category = document.getElementById("scoreCategory").value; // 카테고리 값 가져오기
  const name = document.getElementById("name").value;
  const score = document.getElementById("score").value;

  // DB에 카테고리 정보도 같이 push
  push(scoreRef, {
    category: category, 
    name: name,
    score: score
  });
}

// 🔹 점수 실시간 불러오기 (DB에서 데이터를 가져와 배열에 저장)
onValue(scoreRef, (snapshot) => {
  allScores = []; // 배열 초기화
  snapshot.forEach(child => {
    // 키값과 데이터를 합쳐서 배열에 넣음
    allScores.push({ key: child.key, ...child.val() }); 
  });
  window.renderScores(); // 데이터베이스가 바뀌면 화면을 다시 그림
});

// 🔹 필터에 맞게 화면에 그리기 (새로 추가된 핵심 함수)
window.renderScores = function() {
  const filterVal = document.getElementById("filterCategory").value; // 뭘 선택했는지 확인
  const list = document.getElementById("scoreList");
  list.innerHTML = ""; // 일단 화면 싹 지우기

  allScores.forEach(data => {
    // '전체보기' 이거나, 데이터의 카테고리가 선택한 필터와 같을 때만 화면에 추가
    if (filterVal === "all" || data.category === filterVal) {
      const li = document.createElement("li");
      
      // 기존 데이터에 카테고리가 없을 수도 있으니 안전하게 처리
      const categoryText = data.category ? `[${data.category}]` : "[미분류]"; 
      
      li.innerHTML = `${categoryText} ${data.name} - ${data.score} 
      <button onclick='deleteScore("${data.key}")'>삭제</button>`;
      
      list.appendChild(li);
    }
  });
}

// 🔹 점수 삭제
window.deleteScore = function(key) {
  remove(ref(db, "scores/" + key));
}


// --- 일정 관리 기능 (기존과 동일) ---
window.addEvent = function() {
  const date = document.getElementById("eventDate").value;
  const text = document.getElementById("eventText").value;
  push(eventRef, { date: date, text: text });
}

onValue(eventRef, (snapshot) => {
  const list = document.getElementById("eventList");
  list.innerHTML = "";
  snapshot.forEach(child => {
    const li = document.createElement("li");
    li.innerHTML = child.val().date + " - " + child.val().text +
    " <button onclick='deleteEvent(\""+child.key+"\")'>삭제</button>";
    list.appendChild(li);
  });
});

window.deleteEvent = function(key) {
  remove(ref(db, "events/" + key));
}

</script>

</body>
</html>
